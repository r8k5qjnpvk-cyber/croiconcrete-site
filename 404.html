<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page Not Found | Croi Concrete</title>
<meta name="robots" content="noindex">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
<link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preload" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Lato:wght@300;400&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
<noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Lato:wght@300;400&display=swap"></noscript>
<style>
  :root{--dark:#2a2520;--cream:#f5f0eb;--warm-white:#faf8f5;--accent:#8b7355;--concrete:#9e9589;--light-stone:#e8e2da;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Lato',sans-serif;font-weight:300;background:var(--warm-white);color:var(--dark);min-height:100vh;display:flex;flex-direction:column;}
  nav{border-bottom:1px solid var(--light-stone);padding:0 3rem;height:68px;display:flex;align-items:center;justify-content:space-between;}
  .nav-logo{font-family:'Cormorant Garamond',serif;font-size:1.55rem;font-weight:300;letter-spacing:0.15em;color:var(--dark);text-decoration:none;}
  .nav-link{font-size:0.68rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--concrete);text-decoration:none;transition:color 0.2s;}
  .nav-link:hover{color:var(--dark);}
  main{flex:1;display:flex;align-items:center;justify-content:center;padding:4rem 2rem;text-align:center;}
  .container{max-width:520px;}
  .four-oh-four{font-family:'Cormorant Garamond',serif;font-size:clamp(5rem,15vw,9rem);font-weight:300;color:var(--light-stone);line-height:1;margin-bottom:1.5rem;letter-spacing:0.1em;}
  h1{font-family:'Cormorant Garamond',serif;font-size:1.9rem;font-weight:300;color:var(--dark);margin-bottom:0.8rem;}
  p{font-size:0.86rem;color:var(--concrete);line-height:1.85;margin-bottom:2.5rem;}
  .btn-group{display:flex;gap:1rem;justify-content:center;flex-wrap:wrap;}
  .btn{display:inline-block;text-decoration:none;padding:0.82rem 2rem;font-size:0.68rem;letter-spacing:0.22em;text-transform:uppercase;border-radius:2px;transition:all 0.2s;font-family:'Lato',sans-serif;}
  .btn-primary{background:var(--dark);color:var(--cream);border:1px solid var(--dark);}
  .btn-primary:hover{background:var(--accent);border-color:var(--accent);}
  .btn-secondary{background:transparent;color:var(--dark);border:1px solid var(--dark);}
  .btn-secondary:hover{background:var(--dark);color:var(--cream);}
  footer{border-top:1px solid var(--light-stone);padding:1.5rem 3rem;text-align:center;}
  .footer-copy{font-size:0.68rem;color:var(--concrete);}
</style>
</head>
<body>
<nav>
  <a href="/" class="nav-logo">Croi Concrete</a>
  <a href="/#shop" class="nav-link">Shop</a>
</nav>
<main>
  <div class="container">
    <div class="four-oh-four">404</div>
    <h1>Page not found</h1>
    <p>The page you're looking for doesn't exist or has been moved. Head back to the shop to browse our handmade concrete homeware.</p>
    <div class="btn-group">
      <a href="/" class="btn btn-primary">Back to home</a>
      <a href="/#shop" class="btn btn-secondary">Browse the collection</a>
    </div>
  </div>
</main>
<footer>
  <span class="footer-copy">© <span id="y"></span> Croi Concrete · Handmade in Newcastle upon Tyne</span>
</footer>
<script>document.getElementById('y').textContent = new Date().getFullYear();</script>
</body>
</html>
