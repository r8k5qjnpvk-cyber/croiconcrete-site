<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1200px;
  height: 630px;
  background: linear-gradient(135deg, #f5f0eb 0%, #e8e2da 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  overflow: hidden;
}
.container {
  text-align: center;
  padding: 60px;
}
.brand {
  font-family: Georgia, serif;
  font-size: 72px;
  font-weight: 300;
  letter-spacing: 0.15em;
  color: #2a2520;
  margin-bottom: 20px;
}
.tagline {
  font-size: 32px;
  font-weight: 300;
  color: #9e9589;
  margin-bottom: 40px;
  letter-spacing: 0.05em;
}
.location {
  font-size: 18px;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: #8b7355;
  margin-top: 40px;
}
.visual {
  position: absolute;
  bottom: 60px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 20px;
}
.block {
  width: 80px;
  height: 100px;
  background: linear-gradient(135deg, #9e9589 0%, #8b7355 100%);
  border-radius: 3px;
  box-shadow: 0 10px 30px rgba(42, 37, 32, 0.15);
}
.block:nth-child(2) {
  height: 120px;
  margin-top: -10px;
}
.block:nth-child(3) {
  height: 90px;
  margin-top: 5px;
}
</style>
</head>
<body>
<div class="container">
  <div class="brand">Croi Concrete</div>
  <div class="tagline">Handcrafted Concrete Homeware</div>
  <div class="visual">
    <div class="block"></div>
    <div class="block"></div>
    <div class="block"></div>
  </div>
  <div class="location">Made in Newcastle upon Tyne</div>
</div>
</body>
</html>
